{% extends "base.html" %}
{% block title %}신고하기{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>신고하기</h1>
  <p>대상: <b>{{ '상품' if target_type == 'product' else '사용자' }} — {{ target['label'] }}</b></p>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="target_type" value="{{ target_type }}">
    <input type="hidden" name="target_id" value="{{ target_id }}">
    <label>신고 사유 (10~500자)
      <textarea name="reason" required minlength="10" maxlength="500" rows="5" placeholder="신고 사유를 구체적으로 작성해주세요."></textarea>
    </label>
    <button type="submit" class="danger">신고 접수</button>
  </form>
</div>
{% endblock %}
