{% extends "base.html" %}
{% block title %}{{ '상품 수정' if product else '상품 등록' }}{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>{{ '상품 수정' if product else '상품 등록' }}</h1>
  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>상품명 (1~80자)
      <input name="title" required maxlength="80" value="{{ product['title'] if product else '' }}">
    </label>
    <label>가격 (원)
      <input type="number" name="price" required min="1" max="100000000" value="{{ product['price'] if product else '' }}">
    </label>
    <label>설명 (2000자 이내)
      <textarea name="description" maxlength="2000" rows="6">{{ product['description'] if product else '' }}</textarea>
    </label>
    <label>사진 (png/jpg/jpeg/gif/webp, 2MB 이하)
      <input type="file" name="image" accept=".png,.jpg,.jpeg,.gif,.webp">
    </label>
    <button type="submit">{{ '수정하기' if product else '등록하기' }}</button>
  </form>
</div>
{% endblock %}
