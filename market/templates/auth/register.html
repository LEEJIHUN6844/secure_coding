{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>회원가입</h1>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>아이디 (영문/숫자/밑줄 4~20자)
      <input name="username" required minlength="4" maxlength="20" pattern="[A-Za-z0-9_]+" autocomplete="username">
    </label>
    <label>비밀번호 (8~72자, 영문+숫자)
      <input type="password" name="password" required minlength="8" maxlength="72" autocomplete="new-password">
    </label>
    <label>비밀번호 확인
      <input type="password" name="password2" required minlength="8" maxlength="72" autocomplete="new-password">
    </label>
    <button type="submit">가입하기</button>
  </form>
</div>
{% endblock %}
